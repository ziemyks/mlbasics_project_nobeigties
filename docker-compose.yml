services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "5050:5050"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
